spring:
  application:
    name: sivemor-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sivemor}
    username: ${DB_USERNAME:sivemor}
    password: ${DB_PASSWORD:sivemor}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:10MB}
      max-request-size: ${MAX_UPLOAD_SIZE:10MB}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
  security:
    jwt:
      issuer: ${JWT_ISSUER:sivemor-platform}
      secret: ${JWT_SECRET:replace-me-with-a-64-char-secret-in-env}
      access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:60}
      refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:14}
