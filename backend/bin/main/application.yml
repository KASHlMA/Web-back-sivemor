spring:
  application:
    name: sivemor-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sivemor}
    username: ${DB_USERNAME:sivemor}
    password: ${DB_PASSWORD:sivemor}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: ${MAIL_PROTOCOL:smtp}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:10MB}
      max-request-size: ${MAX_UPLOAD_SIZE:10MB}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
  mail:
    from: ${APP_MAIL_FROM:no-reply@sivemor.local}
    enabled: ${APP_MAIL_ENABLED:false}
    allow-test-inbox: ${APP_MAIL_ALLOW_TEST_INBOX:false}
  security:
    jwt:
      issuer: ${JWT_ISSUER:sivemor-platform}
      secret: ${JWT_SECRET:replace-me-with-a-64-char-secret-in-env}
      access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:60}
      refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:14}
